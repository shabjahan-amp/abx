<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABX Customer Journey — Amplitude</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.35.0/tabler-icons-outline.min.css">
<style>
:root {
  --color-background-primary: #FAF9F5;
  --color-background-secondary: #F0EEE6;
  --color-background-tertiary: #E8E6DC;
  --color-text-primary: #1F1E1D;
  --color-text-secondary: #5C5B57;
  --color-text-tertiary: #8B8A85;
  --color-border-tertiary: rgba(0, 0, 0, 0.08);
  --color-border-secondary: rgba(0, 0, 0, 0.15);
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  --abx-bg: #EEEDFE;
  --abx-text: #26215C;
  --abx-text-strong: #3C3489;
  --abx-accent: #534AB7;
}
@media (prefers-color-scheme: dark) {
  :root {
    --color-background-primary: #262624;
    --color-background-secondary: #1F1E1D;
    --color-background-tertiary: #181816;
    --color-text-primary: #FAF9F5;
    --color-text-secondary: #C2C0B6;
    --color-text-tertiary: #8B8A85;
    --color-border-tertiary: rgba(255, 255, 255, 0.08);
    --color-border-secondary: rgba(255, 255, 255, 0.15);
    --abx-bg: #26215C;
    --abx-text: #CECBF6;
    --abx-text-strong: #EEEDFE;
    --abx-accent: #AFA9EC;
  }
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--color-background-primary);
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.container {
  max-width: 920px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 3rem;
}
.page-header {
  margin: 0 0 2rem;
}
.page-header h1 {
  font-size: 28px;
  font-weight: 500;
  margin: 0 0 6px;
  color: var(--color-text-primary);
}
.page-header p {
  font-size: 14px;
  color: var(--color-text-secondary);
  margin: 0;
  line-height: 1.6;
}
.j-rail {
  display: flex;
  gap: 6px;
  margin: 0 0 1.5rem;
  flex-wrap: wrap;
}
.j-pill {
  flex: 1;
  min-width: 88px;
  padding: 10px 8px;
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  background: transparent;
  cursor: pointer;
  font-size: 11px;
  color: var(--color-text-secondary);
  text-align: center;
  line-height: 1.3;
  transition: background .15s, border-color .15s, color .15s;
  font-family: inherit;
}
.j-pill:hover {
  background: var(--color-background-secondary);
}
.j-pill.active {
  border-color: var(--color-border-secondary);
  background: var(--color-background-secondary);
  color: var(--color-text-primary);
  font-weight: 500;
}
.j-pill .stg {
  display: block;
  font-size: 10px;
  color: var(--color-text-tertiary);
  margin-bottom: 2px;
  font-weight: 400;
}
.j-pill.active .stg {
  color: var(--color-text-secondary);
}
.j-stage {
  font-size: 11px;
  color: var(--color-text-tertiary);
  letter-spacing: .05em;
  text-transform: uppercase;
  margin: 0 0 4px;
}
.j-title {
  font-size: 20px;
  font-weight: 500;
  color: var(--color-text-primary);
  margin: 0 0 4px;
}
.j-sub {
  font-size: 14px;
  color: var(--color-text-secondary);
  margin: 0 0 16px;
  line-height: 1.55;
}
.j-play {
  background: var(--abx-bg);
  border-radius: var(--border-radius-md);
  padding: 14px 16px;
  margin: 0 0 8px;
}
.j-play h4 {
  margin: 0 0 8px;
  font-size: 11px;
  color: var(--abx-text-strong);
  font-weight: 500;
  letter-spacing: .05em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}
.j-play h4 i {
  font-size: 14px;
}
.j-play-lede {
  font-size: 13px;
  color: var(--abx-text);
  line-height: 1.55;
  margin: 0 0 12px;
}
.j-steps {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.j-step {
  flex: 1;
  min-width: 130px;
  background: rgba(255, 255, 255, 0.55);
  border-radius: var(--border-radius-md);
  padding: 8px 10px;
}
@media (prefers-color-scheme: dark) {
  .j-step { background: rgba(0, 0, 0, 0.25); }
}
.j-step .n {
  font-size: 10px;
  color: var(--abx-accent);
  font-weight: 500;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.j-step .t {
  font-size: 11.5px;
  color: var(--abx-text);
  line-height: 1.4;
  margin-top: 2px;
}
.j-legend {
  font-size: 11px;
  color: var(--color-text-tertiary);
  margin: 12px 0 14px;
  padding: 0 4px;
}
.j-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 10px;
}
.j-card {
  background: var(--color-background-secondary);
  border-radius: var(--border-radius-md);
  padding: 12px 14px;
}
.j-card h4 {
  font-size: 12px;
  font-weight: 500;
  margin: 0 0 6px;
  color: var(--color-text-secondary);
  display: flex;
  align-items: center;
  gap: 6px;
}
.j-card h4 i {
  font-size: 14px;
  color: var(--color-text-tertiary);
}
.j-action {
  font-size: 12.5px;
  color: var(--color-text-primary);
  line-height: 1.55;
  margin: 0 0 8px;
}
.j-abx {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 6px 8px;
  background: var(--abx-bg);
  border-radius: 6px;
  font-size: 11.5px;
  color: var(--abx-text);
  line-height: 1.45;
}
.j-abx i {
  font-size: 12px;
  color: var(--abx-accent);
  margin-top: 2px;
  flex-shrink: 0;
}
.j-abx strong {
  font-weight: 500;
  color: var(--abx-text-strong);
}
.j-nav {
  display: flex;
  justify-content: space-between;
  margin: 1.25rem 0 0;
  gap: 8px;
}
.j-nav button {
  flex: 1;
  padding: 10px 14px;
  background: transparent;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  color: var(--color-text-primary);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background .15s, opacity .15s;
}
.j-nav button:hover:not(:disabled) {
  background: var(--color-background-secondary);
}
.j-nav button:active:not(:disabled) {
  transform: scale(0.98);
}
.j-nav button:disabled {
  opacity: .4;
  cursor: not-allowed;
}
.j-nav button i {
  font-size: 14px;
}
@media (max-width: 600px) {
  .container { padding: 1.5rem 1rem 2rem; }
  .page-header h1 { font-size: 22px; }
  .j-pill { min-width: 72px; font-size: 10px; }
  .j-step { min-width: 110px; }
  .j-grid { grid-template-columns: 1fr; }
}
</style>
</head>

  {key:"Expand",stage:"Post-sale · Expand",title:"Expand — multi-thread the org",sub:"Original buyer is happy and now an advocate. Now we systematically expand into adjacent teams, BUs, geographies, and use cases. Same ABX playbook as net-new, on a trusted foundation.",
    play:{lede:"Adjacent BU mapping → persona ads to new teams → champion-led intro events → StatSig cross-sell motion → customer-specific EBC for the new buying committee.",
      steps:[{n:"Month 1",t:"Adjacent BU mapping"},{n:"Month 2",t:"Champion-led intro event"},{n:"Month 3",t:"Persona ads + StatSig cross-sell"},{n:"Month 4",t:"EBC for new buying committee"}]},
    cards:[
      {h:"Sales (AE)",i:"ti-user-check",action:"Expansion opportunity discovery, multi-thread to new buyers, bundle / package upsell",abx:"Built adjacent BU map, supplied new persona briefs"},
      {h:"Community",i:"ti-users-group",action:"Internal champion network, cross-BU user group at customer HQ",abx:"Brokered the cross-BU introductions inside the customer"},
      {h:"Growth & digital",i:"ti-device-desktop",action:"Persona-specific ads to new teams, StatSig + Amplitude cross-sell campaign",abx:"Defined new persona targets, sequenced cross-sell messaging"},
      {h:"Events (field, partner, corporate)",i:"ti-building",action:"Customer-specific EBC for new buying committee (Corporate Events owns in partnership with Sales), partner-led intro to adjacent BU",abx:"ABX coordinates: invite list, agenda direction, exec lineup for new BU"}
    ]}
];

const rail = document.getElementById('j-rail');
const titleEl = document.getElementById('j-title');
const stageEl = document.getElementById('j-stage');
const subEl = document.getElementById('j-sub');
const playEl = document.getElementById('j-play');
const gridEl = document.getElementById('j-grid');
const prev = document.getElementById('j-prev');
const next = document.getElementById('j-next');
let idx = 0;

stages.forEach((s, i) => {
  const b = document.createElement('button');
  b.className = 'j-pill';
  b.type = 'button';
  b.innerHTML = `<span class="stg">${s.stage.split(' · ')[0]}</span>${s.key}`;
  b.addEventListener('click', () => { idx = i; render(); });
  rail.appendChild(b);
});

function render() {
  const s = stages[idx];
  rail.querySelectorAll('.j-pill').forEach((p, i) => p.classList.toggle('active', i === idx));
  stageEl.textContent = s.stage;
  titleEl.textContent = s.title;
  subEl.textContent = s.sub;
  playEl.innerHTML = `<h4><i class="ti ti-flag"></i>The ABX-designed play</h4><p class="j-play-lede">${s.play.lede}</p><div class="j-steps">${s.play.steps.map(st => `<div class="j-step"><div class="n">${st.n}</div><div class="t">${st.t}</div></div>`).join('')}</div>`;
  gridEl.innerHTML = s.cards.map(c => `<div class="j-card"><h4><i class="ti ${c.i}"></i>${c.h}</h4><p class="j-action">${c.action}</p><div class="j-abx"><i class="ti ti-flag"></i><span><strong>ABX:</strong> ${c.abx}</span></div></div>`).join('');
  prev.disabled = idx === 0;
  next.disabled = idx === stages.length - 1;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function step(d) { idx = Math.max(0, Math.min(stages.length - 1, idx + d)); render(); }

prev.addEventListener('click', () => step(-1));
next.addEventListener('click', () => step(1));

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft' && !prev.disabled) step(-1);
  if (e.key === 'ArrowRight' && !next.disabled) step(1);
});

render();
</script>
</body>
</html>
